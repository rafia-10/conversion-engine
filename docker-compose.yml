version: '3.8'

services:
  app:
    build: .
    container_name: conversion-engine-app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    command: python -m flask run --host=0.0.0.0

  db:
    image: postgres:15
    container_name: conversion-engine-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: conversion_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
